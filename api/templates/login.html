<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Investment Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        profit: '#22c55e',
                        loss: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm mx-auto px-4">
        <div class="bg-gray-900 rounded-lg border border-gray-800 p-6">
            <div class="text-center mb-6">
                <div class="text-2xl font-bold text-blue-400 mb-1">IA</div>
                <div class="text-sm text-gray-500">Investment Analyzer</div>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-500 mb-1" for="username">用户名</label>
                    <input id="username" type="text" placeholder="输入用户名"
                        class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm
                               focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                        autocomplete="username" autofocus>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1" for="password">密码</label>
                    <input id="password" type="password" placeholder="输入密码"
                        class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm
                               focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                        autocomplete="current-password">
                </div>
                <div id="error-msg" class="text-xs text-loss hidden">用户名或密码错误</div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded px-3 py-2 transition-colors">
                    登录
                </button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            errorEl.classList.add('hidden');

            try {
                const resp = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password}),
                });
                const data = await resp.json();
                if (data.success) {
                    window.location.href = data.redirect || '/';
                } else {
                    errorEl.classList.remove('hidden');
                }
            } catch {
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
