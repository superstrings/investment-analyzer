<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Investment Analyzer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        profit: '#22c55e',
                        loss: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        /* Markdown content dark theme */
        .md-content { color: #d1d5db; font-size: 0.8rem; line-height: 1.6; }
        .md-content h1 { font-size: 1.1rem; font-weight: 700; color: #f3f4f6; margin: 1rem 0 0.5rem; border-bottom: 1px solid #374151; padding-bottom: 0.3rem; }
        .md-content h2 { font-size: 1rem; font-weight: 700; color: #f3f4f6; margin: 0.8rem 0 0.4rem; }
        .md-content h3 { font-size: 0.9rem; font-weight: 600; color: #e5e7eb; margin: 0.6rem 0 0.3rem; }
        .md-content h4, .md-content h5, .md-content h6 { font-size: 0.85rem; font-weight: 600; color: #e5e7eb; margin: 0.5rem 0 0.2rem; }
        .md-content p { margin: 0.4rem 0; }
        .md-content ul, .md-content ol { margin: 0.4rem 0; padding-left: 1.5rem; }
        .md-content li { margin: 0.15rem 0; }
        .md-content strong { color: #f9fafb; font-weight: 600; }
        .md-content em { color: #d1d5db; }
        .md-content code { background: #1f2937; color: #a5b4fc; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.75rem; }
        .md-content pre { background: #1f2937; border: 1px solid #374151; border-radius: 6px; padding: 0.6rem; margin: 0.5rem 0; overflow-x: auto; }
        .md-content pre code { background: none; padding: 0; }
        .md-content blockquote { border-left: 3px solid #4b5563; padding-left: 0.8rem; color: #9ca3af; margin: 0.5rem 0; }
        .md-content table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; font-size: 0.75rem; }
        .md-content th { background: #1f2937; color: #e5e7eb; padding: 0.4rem 0.6rem; border: 1px solid #374151; text-align: left; font-weight: 600; }
        .md-content td { padding: 0.3rem 0.6rem; border: 1px solid #374151; }
        .md-content tr:nth-child(even) { background: rgba(31,41,55,0.5); }
        .md-content a { color: #60a5fa; text-decoration: underline; }
        .md-content hr { border: none; border-top: 1px solid #374151; margin: 0.6rem 0; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen overflow-x-hidden">
    <!-- Navigation -->
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-12">
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-lg font-bold text-blue-400">IA</a>
                    <div class="hidden md:flex items-center space-x-4">
                        <a href="/" class="text-sm text-gray-300 hover:text-white {% block nav_home %}{% endblock %}">首页</a>
                        <a href="/portfolio" class="text-sm text-gray-300 hover:text-white {% block nav_portfolio %}{% endblock %}">持仓</a>
                        <a href="/watchlist" class="text-sm text-gray-300 hover:text-white {% block nav_watchlist %}{% endblock %}">关注</a>
                        <a href="/signals" class="text-sm text-gray-300 hover:text-white {% block nav_signals %}{% endblock %}">信号</a>
                        <a href="/plans" class="text-sm text-gray-300 hover:text-white {% block nav_plans %}{% endblock %}">计划</a>
                        <a href="/analysis" class="text-sm text-gray-300 hover:text-white {% block nav_analysis %}{% endblock %}">分析</a>
                        <a href="/calendar" class="text-sm text-gray-300 hover:text-white {% block nav_calendar %}{% endblock %}">工具</a>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="relative hidden md:block">
                        <input id="nav-search" type="text" placeholder="搜索代码/名称..."
                            class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm w-40 focus:w-56 transition-all focus:outline-none focus:border-blue-500"
                            autocomplete="off">
                        <div id="search-dropdown" class="absolute right-0 top-full mt-1 w-64 bg-gray-800 border border-gray-700 rounded-lg shadow-xl z-[60] hidden max-h-80 overflow-y-auto"></div>
                    </div>
                    <button id="mobile-search-btn" onclick="toggleMobileSearch()" class="md:hidden text-gray-300 hover:text-white p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </button>
                </div>
            </div>
            <!-- Mobile search bar (toggled) -->
            <div id="mobile-search-bar" class="hidden md:hidden pb-2 px-2">
                <div class="relative">
                    <input id="nav-search-mobile" type="text" placeholder="搜索代码/名称..."
                        class="bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-sm w-full focus:outline-none focus:border-blue-500"
                        autocomplete="off">
                    <div id="search-dropdown-mobile" class="absolute left-0 right-0 top-full mt-1 bg-gray-800 border border-gray-700 rounded-lg shadow-xl z-[60] hidden max-h-80 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </nav>
    <!-- Mobile two-row nav -->
    <div class="md:hidden bg-gray-900 border-b border-gray-800 px-3 py-1.5 flex flex-wrap gap-x-1 gap-y-0.5 text-xs sticky top-12 z-40">
        <a href="/" class="px-2 py-1 text-gray-300 hover:text-white rounded hover:bg-gray-800 {% block nav_home_m %}{% endblock %}">首页</a>
        <a href="/portfolio" class="px-2 py-1 text-gray-300 hover:text-white rounded hover:bg-gray-800 {% block nav_portfolio_m %}{% endblock %}">持仓</a>
        <a href="/watchlist" class="px-2 py-1 text-gray-300 hover:text-white rounded hover:bg-gray-800 {% block nav_watchlist_m %}{% endblock %}">关注</a>
        <a href="/signals" class="px-2 py-1 text-gray-300 hover:text-white rounded hover:bg-gray-800 {% block nav_signals_m %}{% endblock %}">信号</a>
        <a href="/plans" class="px-2 py-1 text-gray-300 hover:text-white rounded hover:bg-gray-800 {% block nav_plans_m %}{% endblock %}">计划</a>
        <a href="/analysis" class="px-2 py-1 text-gray-300 hover:text-white rounded hover:bg-gray-800 {% block nav_analysis_m %}{% endblock %}">分析</a>
        <a href="/calendar" class="px-2 py-1 text-gray-300 hover:text-white rounded hover:bg-gray-800 {% block nav_calendar_m %}{% endblock %}">工具</a>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-4">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Fetch JSON and render helper
        async function fetchData(url) {
            const resp = await fetch(url);
            return resp.json();
        }

        function formatNum(n, decimals=0) {
            if (n === null || n === undefined) return '-';
            return Number(n).toLocaleString('zh-CN', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }

        function formatPct(n) {
            if (n === null || n === undefined) return '-';
            const pct = (Number(n) * 100).toFixed(2);
            return (pct >= 0 ? '+' : '') + pct + '%';
        }

        function plColor(val) {
            if (val > 0) return 'text-profit';
            if (val < 0) return 'text-loss';
            return 'text-gray-400';
        }

        // Stock page navigation utilities
        function stockUrl(fullCode) {
            const parts = fullCode.split('.');
            const market = parts[0];
            const code = parts.slice(1).join('.');
            return '/stock/' + market + '/' + code;
        }

        function makeStockLink(fullCode, displayText) {
            const a = document.createElement('a');
            a.href = stockUrl(fullCode);
            a.className = 'text-blue-400 hover:text-blue-300 hover:underline';
            a.textContent = displayText || fullCode;
            return a;
        }

        // Mobile search toggle
        function toggleMobileSearch() {
            const bar = document.getElementById('mobile-search-bar');
            const isHidden = bar.classList.contains('hidden');
            bar.classList.toggle('hidden');
            if (isHidden) {
                const input = document.getElementById('nav-search-mobile');
                if (input) input.focus();
            }
        }

        // Format ISO datetime to MM-DD HH:mm
        function formatTime(isoStr) {
            if (!isoStr) return '';
            const d = new Date(isoStr);
            if (isNaN(d.getTime())) return isoStr;
            const pad = n => String(n).padStart(2, '0');
            return pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        }

        // Markdown rendering helpers
        function renderMarkdown(text) {
            var html = (typeof marked !== 'undefined') ? marked.parse(text) : text.replace(/\n/g, '<br>');
            return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(html) : html;
        }

        function extractAnalysisText(resultJson) {
            if (!resultJson) return null;
            try {
                var data = JSON.parse(resultJson);
                if (data.analysis && typeof data.analysis === 'string') return data.analysis;
                if (data.v12_analysis || data.v12_framework) return null;
                return null;
            } catch(e) {
                if (resultJson.length > 50 && (resultJson.includes('#') || resultJson.includes('**')))
                    return resultJson;
                return null;
            }
        }

        // Global search (shared logic for desktop + mobile)
        function initSearch(input, dropdown) {
            let debounceTimer = null;
            input.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                const q = this.value.trim();
                if (q.length < 1) { dropdown.classList.add('hidden'); return; }
                debounceTimer = setTimeout(() => doSearch(q, dropdown), 300);
            });
            input.addEventListener('blur', function() {
                setTimeout(() => dropdown.classList.add('hidden'), 200);
            });
            input.addEventListener('focus', function() {
                if (dropdown.children.length > 0 && this.value.trim().length >= 1) {
                    dropdown.classList.remove('hidden');
                }
            });
        }

        async function doSearch(q, dropdown) {
            try {
                const data = await fetchData('/api/search?q=' + encodeURIComponent(q));
                dropdown.textContent = '';
                if (!data.results || data.results.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'px-3 py-2 text-sm text-gray-500';
                    empty.textContent = '无结果';
                    dropdown.appendChild(empty);
                } else {
                    data.results.forEach(r => {
                        const item = document.createElement('a');
                        item.href = stockUrl(r.code);
                        item.className = 'block px-3 py-2 hover:bg-gray-700 text-sm cursor-pointer';
                        const codeSp = document.createElement('span');
                        codeSp.className = 'text-blue-400 font-medium';
                        codeSp.textContent = r.code;
                        const nameSp = document.createElement('span');
                        nameSp.className = 'text-gray-400 ml-2';
                        nameSp.textContent = r.name || '';
                        const srcSp = document.createElement('span');
                        srcSp.className = 'text-gray-600 ml-2 text-xs';
                        srcSp.textContent = r.source || '';
                        item.appendChild(codeSp);
                        item.appendChild(nameSp);
                        item.appendChild(srcSp);
                        dropdown.appendChild(item);
                    });
                }
                dropdown.classList.remove('hidden');
            } catch(e) {}
        }

        // Init both desktop and mobile search
        (function() {
            const desktopInput = document.getElementById('nav-search');
            const desktopDropdown = document.getElementById('search-dropdown');
            if (desktopInput && desktopDropdown) initSearch(desktopInput, desktopDropdown);

            const mobileInput = document.getElementById('nav-search-mobile');
            const mobileDropdown = document.getElementById('search-dropdown-mobile');
            if (mobileInput && mobileDropdown) initSearch(mobileInput, mobileDropdown);
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
